# .golangci.yml
#
# Tier 1 — Standard lint (~2 minutes). CI gating.
#
# Run:
#   lint                          (inside nix develop)
#   nix build .#checks.golangci-lint
#
# Policy: every exclusion below states WHY. When a linter fires, the default
# is to fix the code, not add an exclusion.

version: "2"

run:
  timeout: 5m
  modules-download-mode: vendor

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none
  enable:
    # Tier 0
    - govet
    - errcheck
    - ineffassign
    - unused
    - staticcheck
    # Tier 1 additions
    - gosec
    - gocritic
    - revive
    - noctx
    - contextcheck
    - durationcheck
    # Project-specific: forbid runtime.UnlockOSThread in code paths that
    # also do setns/unshare, because the pairing is dangerous (see the
    # forbidigo block below for the why).
    - forbidigo

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        # fmt.Fprintf/Fprintln to stdout/stderr writers can't fail in
        # practice (writes to *os.File-backed tty fail only on EBADF or
        # disk-full for regular files, neither of which we recover from).
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint

    govet:
      enable-all: true
      disable:
        - fieldalignment
        # err shadowing is idiomatic Go and the repo uses it throughout.
        # Disable the shadow check rather than rewriting 26 sites just to
        # satisfy the linter — the pattern doesn't produce real bugs here.
        - shadow

    staticcheck:
      checks:
        - "all"
        - "-SA1019"

    gosec:
      excludes:
        # G103: unsafe pointer use is intentional in pkg/io_uring (giouring wraps
        #       liburing SQE/CQE structures with unsafe.Pointer).
        - G103
        # G115: integer overflow conversions appear in netlink parsing (uint16
        #       length fields) and io_uring batch indices; all are bounds-checked.
        - G115
        # G204: cmd/ns and cmd/nsTest spawn `ip netns exec ...`; required by design.
        - G204
        # G304: register_schema reads .proto files whose path comes from CLI flags.
        - G304

    gocritic:
      enabled-checks:
        - appendAssign
        - argOrder
        - badCond
        - builtinShadow
        - dupCase
        - dupSubExpr
        - nilValReturn
        - rangeValCopy
        - sliceClear
      disabled-checks:
        # hugeParam: triggers on every netlink callback handler that takes a
        # NlMsgHdr struct (cheap to copy on hot path; not worth pointer churn).
        - hugeParam

    revive:
      rules:
        - name: context-as-argument
        - name: context-keys-type
        - name: error-return
        - name: error-strings
        - name: increment-decrement
        - name: var-declaration

    # Forbidigo guards a specific landmine: `runtime.UnlockOSThread` paired
    # with `unix.Setns` / `unix.Unshare`. If the goroutine modifies
    # thread-global state (network namespace) and then unconditionally
    # unlocks, a *tainted* M can be returned to Go's scheduler — the
    # runtime can't safely reuse it, parks it, and spawns a new one.
    # Under heavy ns churn this leaks OS threads up to the SetMaxThreads
    # cap and crashes the daemon (incident: 12 h s3parquet-long soak hit
    # `fatal error: thread exhaustion` at 1 h 45 min).
    #
    # The safe pattern is: do *not* defer UnlockOSThread; instead, inside
    # the deferred restore func, call UnlockOSThread ONLY after Setns
    # confirms the original namespace was restored. On restore failure,
    # exit the goroutine with the lock still held — the Go runtime then
    # terminates the OS thread (documented LockOSThread behaviour),
    # which is exactly what we want for a tainted M.
    #
    # If you have a legitimate non-netns use of UnlockOSThread (e.g.
    # io_uring SQ thread pinning), opt in with `//nolint:forbidigo //
    # <reason>` at the call site. Anyone touching the netns path will
    # then see why the rule exists.
    forbidigo:
      forbid:
        - pattern: '^runtime\.UnlockOSThread$'
          msg: |
            runtime.UnlockOSThread is unsafe to defer unconditionally in
            code that calls unix.Setns / unix.Unshare — the M can be
            returned to the scheduler still in a modified namespace,
            triggering an unbounded thread leak. Pair it with a
            *conditional* unlock inside the restore defer, or
            `//nolint:forbidigo // <reason>` if unrelated.

  exclusions:
    warn-unused: true
    paths:
      # Skip generated code entirely (don't even type-check it).
      - ".*\\.pb\\.go$"
      - ".*\\.pb\\.gw\\.go$"
      - "^gen/"
      - "^dart/"
      - "^python/"
    rules:
      # Test code: relax dup/funlen/gocyclo/errcheck/unused/goconst/noctx.
      # Repeated CLI-flag strings in -Args tests + net.Listen/DialTimeout
      # without ctx are idiomatic for test setup; lifting them into
      # constants or contextual variants adds noise without benefit.
      - path: "_test\\.go"
        linters:
          - dupl
          - funlen
          - gocyclo
          - errcheck
          - unused
          - goconst
          - noctx
      # gosec G404 (math/rand): deterministic randomness is the right
      # default in tests. G301 (0o755 dir perms): tempdirs created by
      # t.TempDir() are already private to the test user; the perms on
      # subdirs created inside don't materially affect anything.
      - path: "_test\\.go"
        linters:
          - gosec
        text: "G404|G301"
      # Kernel-version-tagged names (TCPInfo6_10_3, TCPInfo5_4_281, …) mirror
      # Linux kernel uapi `struct tcp_info` revisions. Renaming breaks the
      # explicit per-version mapping that is the point of pkg/xtcpnl.
      - path: "pkg/xtcpnl/"
        linters:
          - staticcheck
        text: "ST1003: should not use underscores in Go names; (struct field|const) TCPInfo[0-9_]+(_Size(Cst)?)?"
      # ST1003 (naming): protobuf-generated names (PerStream, IO_uring, etc.)
      # cannot be changed without breaking wire compatibility.
      - linters:
          - staticcheck
        text: "ST1003:"
      # SA9003 (empty branches): allowed for documented "no-op on purpose"
      # cases — e.g., netlink message filters that intentionally skip a class.
      - linters:
          - staticcheck
        text: "SA9003:"

output:
  formats:
    text:
      print-issued-lines: true
      print-linter-name: true
