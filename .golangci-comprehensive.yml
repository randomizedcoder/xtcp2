# .golangci-comprehensive.yml
#
# Tier 2 — Comprehensive lint (~10 minutes). Nightly only.
#
# Surfaces complexity, duplication, allocation, and exhaustiveness findings on
# top of Tier 1. Findings here become merge-gating once the team accepts them.
#
# Run:
#   lint-comprehensive            (inside nix develop)
#   nix build .#checks.golangci-lint-comprehensive

version: "2"

run:
  timeout: 15m
  modules-download-mode: vendor

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none
  enable:
    # Tier 0
    - govet
    - errcheck
    - ineffassign
    - unused
    - staticcheck
    # Tier 1
    - gosec
    - gocritic
    - revive
    - noctx
    - contextcheck
    - durationcheck
    # Tier 2 additions
    - exhaustive
    - prealloc
    - gocyclo
    - funlen
    - goconst
    - dupl
    - unconvert
    - nakedret
    - misspell

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close

    govet:
      enable-all: true
      disable:
        - fieldalignment
      settings:
        shadow:
          strict: true

    staticcheck:
      checks:
        - "all"
        - "-SA1019"

    gosec:
      excludes:
        - G103
        - G115
        - G204
        - G304

    gocritic:
      enabled-checks:
        - appendAssign
        - argOrder
        - badCond
        - builtinShadow
        - dupCase
        - dupSubExpr
        - nilValReturn
        - rangeValCopy
        - sliceClear
      disabled-checks:
        - hugeParam

    revive:
      rules:
        - name: context-as-argument
        - name: context-keys-type
        - name: error-return
        - name: error-strings
        - name: increment-decrement
        - name: var-declaration

    gocyclo:
      min-complexity: 30

    funlen:
      lines: 100
      statements: 60

    goconst:
      min-len: 3
      min-occurrences: 3

    dupl:
      threshold: 150

    nakedret:
      max-func-lines: 30

    misspell:
      locale: US

    exhaustive:
      default-signifies-exhaustive: true

  exclusions:
    warn-unused: true
    paths:
      # Skip generated code entirely (don't even type-check it).
      - ".*\\.pb\\.go$"
      - ".*\\.pb\\.gw\\.go$"
      - "^gen/"
      - "^dart/"
      - "^python/"
    rules:
      - path: "_test\\.go"
        linters:
          - dupl
          - funlen
          - gocyclo
          - errcheck
          - unused
      - path: "_test\\.go"
        linters:
          - gosec
        text: "G404"
      # Kernel-version-tagged names (TCPInfo6_10_3, TCPInfo5_4_281, …) mirror
      # Linux kernel uapi `struct tcp_info` revisions; renaming would defeat
      # the per-version mapping that is the point of pkg/xtcpnl.
      - path: "pkg/xtcpnl/"
        linters:
          - staticcheck
        text: "ST1003: should not use underscores in Go names; (struct field|const) TCPInfo[0-9_]+(_Size(Cst)?)?"
      # tools/ analyzers are short utilities; complexity/duplication limits don't apply.
      - path: "tools/"
        linters:
          - funlen
          - gocyclo
          - dupl
      - linters:
          - staticcheck
        text: "ST1003:"
      - linters:
          - staticcheck
        text: "SA9003:"

output:
  formats:
    text:
      print-issued-lines: true
      print-linter-name: true
